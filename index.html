<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Мистресс Луна — Гадание</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0714;
    --surface: #120d20;
    --card: #1a1230;
    --border: rgba(180,130,255,0.18);
    --gold: #c9a84c;
    --gold2: #f0d080;
    --purple: #9b6dff;
    --purple2: #c4a0ff;
    --text: #e8dff5;
    --muted: #8878a8;
    --glow: rgba(155,109,255,0.35);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Raleway', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ─── STARFIELD ─────────────────────────────────────────────── */
  #stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(100,50,200,0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(50,20,120,0.10) 0%, transparent 60%);
  }
  .star {
    position: absolute; border-radius: 50%;
    background: white; animation: twinkle var(--d) ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100%{opacity:var(--min);transform:scale(1)}
    50%{opacity:1;transform:scale(1.4)}
  }

  /* ─── MOON ──────────────────────────────────────────────────── */
  .moon {
    position: fixed; top: -60px; right: -40px;
    width: 200px; height: 200px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #f5e8b0, #c9a84c 50%, #8b6914);
    box-shadow: 0 0 60px rgba(201,168,76,0.3), 0 0 120px rgba(201,168,76,0.1);
    opacity: 0.6; pointer-events: none; z-index: 0;
    animation: moonFloat 8s ease-in-out infinite;
  }
  @keyframes moonFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(12px)} }

  /* ─── LAYOUT ────────────────────────────────────────────────── */
  .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 0 80px; }

  /* ─── HEADER ────────────────────────────────────────────────── */
  .header {
    text-align: center; padding: 40px 20px 28px;
    border-bottom: 1px solid var(--border);
  }
  .header-orb {
    width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 16px;
    background: radial-gradient(circle at 35% 30%, #c4a0ff, #6b35d9 55%, #2d0f6b);
    box-shadow: 0 0 30px var(--glow), 0 0 60px rgba(107,53,217,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; animation: orbPulse 3s ease-in-out infinite;
  }
  @keyframes orbPulse {
    0%,100%{box-shadow:0 0 30px var(--glow),0 0 60px rgba(107,53,217,0.2)}
    50%{box-shadow:0 0 50px var(--glow),0 0 100px rgba(107,53,217,0.35)}
  }
  .header h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: 20px; font-weight: 700; letter-spacing: 1px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 50%, var(--gold) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }
  .header p {
    font-family: 'IM Fell English', serif; font-style: italic;
    font-size: 14px; color: var(--muted);
  }

  /* ─── SCREEN MANAGER ─────────────────────────────────────────── */
  .screen { display: none; padding: 0 16px; }
  .screen.active { display: block; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  /* ─── SECTION TITLE ─────────────────────────────────────────── */
  .section-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 13px; letter-spacing: 2px; color: var(--gold);
    text-transform: uppercase; margin: 24px 0 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title::after {
    content:''; flex:1; height:1px;
    background: linear-gradient(to right, var(--border), transparent);
  }

  /* ─── SERVICE CARDS ─────────────────────────────────────────── */
  .services-grid { display: flex; flex-direction: column; gap: 10px; }

  .svc-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex; align-items: center; gap: 14px;
    cursor: pointer; transition: all 0.2s ease;
    position: relative; overflow: hidden;
  }
  .svc-card::before {
    content:''; position:absolute; inset:0;
    background: linear-gradient(135deg, rgba(155,109,255,0.06), transparent);
    opacity:0; transition:opacity 0.2s;
  }
  .svc-card:active { transform: scale(0.97); }
  .svc-card:hover::before { opacity: 1; }
  .svc-card.selected {
    border-color: var(--purple);
    box-shadow: 0 0 20px rgba(155,109,255,0.2);
  }
  .svc-card.selected::before { opacity: 1; }

  .svc-emoji { font-size: 28px; flex-shrink: 0; width: 44px; text-align: center; }
  .svc-info { flex: 1; }
  .svc-name {
    font-family: 'IM Fell English', serif;
    font-size: 16px; color: var(--text); margin-bottom: 3px;
  }
  .svc-desc { font-size: 12px; color: var(--muted); }
  .svc-price {
    font-family: 'Cinzel Decorative', serif;
    font-size: 12px; color: var(--gold);
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 20px; padding: 3px 10px;
    white-space: nowrap; flex-shrink: 0;
  }
  .svc-price.free { color: #6dbf7f; background: rgba(109,191,127,0.1); border-color: rgba(109,191,127,0.2); }

  /* ─── QUESTION SCREEN ───────────────────────────────────────── */
  .selected-svc-banner {
    background: linear-gradient(135deg, rgba(155,109,255,0.12), rgba(107,53,217,0.06));
    border: 1px solid rgba(155,109,255,0.25);
    border-radius: 14px; padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    margin: 20px 0 0;
  }
  .selected-svc-banner .emoji { font-size: 28px; }
  .selected-svc-banner .name {
    font-family: 'IM Fell English', serif;
    font-size: 16px;
  }
  .selected-svc-banner .price { color: var(--gold); font-size: 13px; margin-top: 2px; }

  .question-label {
    font-family: 'IM Fell English', serif; font-style: italic;
    font-size: 15px; color: var(--purple2);
    margin: 20px 0 10px;
  }
  .question-input {
    width: 100%; background: var(--card);
    border: 1px solid var(--border); border-radius: 12px;
    color: var(--text); font-family: 'Raleway', sans-serif; font-size: 15px;
    padding: 14px 16px; resize: none; outline: none;
    transition: border-color 0.2s; min-height: 90px;
  }
  .question-input::placeholder { color: var(--muted); font-style: italic; }
  .question-input:focus { border-color: var(--purple); }

  .hint-text { font-size: 12px; color: var(--muted); margin-top: 8px; font-style: italic; }

  /* ─── PAYMENT SCREEN ────────────────────────────────────────── */
  .payment-methods { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
  .pay-btn {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer; transition: all 0.2s; color: var(--text);
    font-family: 'Raleway', sans-serif; font-size: 15px;
  }
  .pay-btn:active { transform: scale(0.97); }
  .pay-btn .pay-icon { font-size: 24px; width: 36px; text-align: center; }
  .pay-btn .pay-label { flex: 1; text-align: left; }
  .pay-btn .pay-badge {
    font-size: 11px; padding: 2px 8px; border-radius: 10px;
    background: rgba(201,168,76,0.12); color: var(--gold);
    border: 1px solid rgba(201,168,76,0.2);
  }
  .pay-btn.demo { border-style: dashed; opacity: 0.7; }
  .pay-notice {
    background: rgba(201,168,76,0.07);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 10px; padding: 12px 14px;
    font-size: 12px; color: var(--gold); margin-top: 14px;
    font-style: italic; text-align: center;
  }

  /* ─── LOADING ───────────────────────────────────────────────── */
  .loading-screen {
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 60px 20px; text-align: center;
  }
  .loading-screen.active { display: flex; }

  .crystal-ball {
    width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 28px;
    background: radial-gradient(circle at 35% 30%, #d4b8ff 0%, #7c3aed 40%, #2d0f6b 75%, #0a0714 100%);
    box-shadow: 0 0 40px rgba(124,58,237,0.5), 0 0 80px rgba(124,58,237,0.2), inset 0 0 30px rgba(0,0,0,0.4);
    animation: crystalPulse 2s ease-in-out infinite;
    position: relative; overflow: hidden;
  }
  .crystal-ball::after {
    content:''; position: absolute;
    top: 15%; left: 20%; width: 35%; height: 25%;
    background: rgba(255,255,255,0.25);
    border-radius: 50%; filter: blur(6px);
    animation: crystalShine 2s ease-in-out infinite;
  }
  @keyframes crystalPulse {
    0%,100%{transform:scale(1)}
    50%{transform:scale(1.04)}
  }
  @keyframes crystalShine {
    0%,100%{opacity:0.25} 50%{opacity:0.5}
  }

  .loading-dots {
    display: flex; gap: 8px; justify-content: center; margin-bottom: 16px;
  }
  .loading-dots span {
    width: 8px; height: 8px; border-radius: 50%; background: var(--purple);
    animation: dotBounce 1.4s ease-in-out infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotBounce { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }

  .loading-text {
    font-family: 'IM Fell English', serif; font-style: italic;
    font-size: 15px; color: var(--purple2); min-height: 44px;
  }

  /* ─── RESULT ────────────────────────────────────────────────── */
  .result-header {
    text-align: center; padding: 28px 0 20px;
    border-bottom: 1px solid var(--border); margin-bottom: 20px;
  }
  .result-emoji { font-size: 52px; margin-bottom: 10px; }
  .result-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 16px; color: var(--gold);
  }
  .result-body {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px;
    font-family: 'IM Fell English', serif; font-size: 15px;
    line-height: 1.8; color: var(--text);
    white-space: pre-wrap; word-break: break-word;
    box-shadow: inset 0 0 40px rgba(0,0,0,0.2);
    position: relative; overflow: hidden;
  }
  .result-body::before {
    content: '"'; position: absolute; top: -10px; left: 12px;
    font-size: 80px; color: rgba(155,109,255,0.1);
    font-family: 'IM Fell English', serif;
  }

  /* ─── BOTTOM ACTIONS ─────────────────────────────────────────── */
  .action-row {
    display: flex; gap: 10px; margin-top: 20px;
  }
  .btn {
    flex: 1; padding: 14px; border-radius: 12px;
    font-family: 'Raleway', sans-serif; font-weight: 500;
    font-size: 14px; cursor: pointer; border: none;
    transition: all 0.2s; letter-spacing: 0.3px;
  }
  .btn-primary {
    background: linear-gradient(135deg, #7c3aed, #9b6dff);
    color: white;
    box-shadow: 0 4px 20px rgba(124,58,237,0.4);
  }
  .btn-primary:active { transform: scale(0.97); }
  .btn-secondary {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
  }
  .btn-secondary:active { transform: scale(0.97); }
  .btn-gold {
    background: linear-gradient(135deg, #8b6914, #c9a84c, #f0d080, #c9a84c);
    color: #1a0f00; font-weight: 700;
    box-shadow: 0 4px 20px rgba(201,168,76,0.3);
  }
  .btn-gold:active { transform: scale(0.97); }

  /* ─── BACK BUTTON ───────────────────────────────────────────── */
  .back-btn {
    display: flex; align-items: center; gap: 6px;
    color: var(--muted); font-size: 13px;
    cursor: pointer; padding: 16px 0 0;
    background: none; border: none;
  }
  .back-btn:active { color: var(--purple2); }

  /* ─── BOTTOM NAV ────────────────────────────────────────────── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(10,7,20,0.95);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    display: flex; z-index: 100;
    max-width: 480px; margin: 0 auto;
  }
  .nav-btn {
    flex: 1; padding: 10px 0;
    display: flex; flex-direction: column;
    align-items: center; gap: 3px;
    cursor: pointer; transition: opacity 0.2s;
    background: none; border: none; color: var(--muted);
    font-family: 'Raleway', sans-serif; font-size: 10px;
  }
  .nav-btn.active { color: var(--purple2); }
  .nav-btn .nav-icon { font-size: 20px; }

  /* ─── HISTORY ───────────────────────────────────────────────── */
  .history-item {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
    cursor: pointer; transition: border-color 0.2s;
  }
  .history-item:hover { border-color: var(--purple); }
  .history-top { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .history-emoji { font-size: 20px; }
  .history-name { font-family: 'IM Fell English', serif; font-size: 15px; flex: 1; }
  .history-date { font-size: 11px; color: var(--muted); }
  .history-preview { font-size: 13px; color: var(--muted); font-style: italic; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-family: 'IM Fell English', serif; font-style: italic; font-size: 15px; }

  /* ─── SCROLLBAR ─────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div id="stars"></div>
<div class="moon"></div>

<div class="app">
  <!-- HEADER -->
  <div class="header">
    <div class="header-orb">🔮</div>
    <h1>Мистресс Луна</h1>
    <p>Тайны прошлого, настоящего и будущего</p>
  </div>

  <!-- SCREEN: SERVICES -->
  <div class="screen active" id="screen-services">
    <p class="section-title">Выбери гадание</p>
    <div class="services-grid" id="services-grid"></div>
  </div>

  <!-- SCREEN: QUESTION -->
  <div class="screen" id="screen-question">
    <button class="back-btn" onclick="goBack('screen-services')">← Назад</button>
    <div id="selected-banner"></div>
    <p class="question-label">✦ Задай свой вопрос звёздам...</p>
    <textarea class="question-input" id="question-input" placeholder="Что скрывает судьба? Что ждёт меня в любви? Или напиши «общее» для послания дня..." rows="3"></textarea>
    <p class="hint-text">Напиши «общее» для послания без конкретного вопроса</p>
    <div class="action-row" style="margin-top:20px">
      <button class="btn btn-primary" onclick="proceedToPayment()">Далее →</button>
    </div>
  </div>

  <!-- SCREEN: PAYMENT -->
  <div class="screen" id="screen-payment">
    <button class="back-btn" onclick="goBack('screen-question')">← Назад</button>
    <p class="section-title" style="margin-top:16px">Оплата</p>
    <div id="payment-summary"></div>
    <div class="payment-methods">
      <button class="pay-btn" onclick="simulatePayment('stars')">
        <span class="pay-icon">⭐</span>
        <span class="pay-label">Telegram Stars</span>
        <span class="pay-badge" id="stars-amount"></span>
      </button>
      <button class="pay-btn" onclick="simulatePayment('card')">
        <span class="pay-icon">💳</span>
        <span class="pay-label">Банковская карта</span>
        <span class="pay-badge" id="rub-amount"></span>
      </button>
      <button class="pay-btn demo" onclick="simulatePayment('demo')">
        <span class="pay-icon">🎁</span>
        <span class="pay-label">Промокод / Демо-доступ</span>
        <span class="pay-badge" style="color:#6dbf7f;background:rgba(109,191,127,0.1);border-color:rgba(109,191,127,0.2)">БЕСПЛАТНО</span>
      </button>
    </div>
    <div class="pay-notice">⚠️ Оплата в тестовом режиме — все варианты проведут вас к гаданию</div>
  </div>

  <!-- SCREEN: LOADING -->
  <div class="screen" id="screen-loading">
    <div class="loading-screen active">
      <div class="crystal-ball"></div>
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <div class="loading-text" id="loading-text">Вглядываюсь в туман времени...</div>
    </div>
  </div>

  <!-- SCREEN: RESULT -->
  <div class="screen" id="screen-result">
    <div class="result-header">
      <div class="result-emoji" id="result-emoji">🔮</div>
      <div class="result-title" id="result-title">Предсказание</div>
    </div>
    <div class="result-body" id="result-body"></div>
    <div class="action-row">
      <button class="btn btn-secondary" onclick="showScreen('screen-services')">🔮 Ещё</button>
      <button class="btn btn-gold" onclick="shareResult()">✨ Поделиться</button>
    </div>
  </div>

  <!-- SCREEN: HISTORY -->
  <div class="screen" id="screen-history">
    <p class="section-title">История гаданий</p>
    <div id="history-list"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" onclick="navTo('screen-services', this)">
    <span class="nav-icon">🔮</span><span>Гадать</span>
  </button>
  <button class="nav-btn" onclick="navTo('screen-history', this)">
    <span class="nav-icon">📜</span><span>История</span>
  </button>
</div>

<script>
// ─── TELEGRAM INIT ─────────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#0a0714');
  tg.setBackgroundColor('#0a0714');
}

// ─── GROQ API ──────────────────────────────────────────────────
const GROQ_KEY = 'YOUR_GROQ_API_KEY'; // Замени на ключ с console.groq.com

const SERVICES = [
  { key:'tarot',   emoji:'🃏', name:'Расклад Таро',        desc:'Три карты: прошлое, настоящее, будущее', price:99  },
  { key:'runes',   emoji:'ᚱ',  name:'Руны судьбы',         desc:'Три руны открывают твой путь',           price:79  },
  { key:'crystal', emoji:'🔮', name:'Хрустальный шар',     desc:'Послание из глубин времени',             price:129 },
  { key:'love',    emoji:'❤️', name:'Гадание на любовь',   desc:'Тайны сердечных дел',                    price:89  },
  { key:'year',    emoji:'🌟', name:'Прогноз на год',       desc:'12 месяцев — 12 откровений',             price:199 },
  { key:'free',    emoji:'✨', name:'Карта дня',            desc:'Бесплатное послание на сегодня',         price:0   },
];

const PROMPTS = {
  tarot: `Ты — таинственная гадалка Мистресс Луна, мастер Таро. Сделай расклад на 3 карты (прошлое/настоящее/будущее). Назови карты, опиши их символику, дай глубокое поэтичное толкование применительно к вопросу. Используй эмодзи 🃏. 300-350 слов.`,
  runes: `Ты — мудрый рунный прорицатель Скальд Одина. Вытяни 3 руны из Старшего Футарка, назови их, объясни символику, дай толкование. Говори как древний северный мудрец. 300-350 слов.`,
  crystal:`Ты — прорицательница Серебряный Туман. Описывай что видишь в хрустальном шаре — образы, символы, видения. Пиши образно и поэтично, как будто смотришь сквозь туман времени. Используй 🔮. 300-350 слов.`,
  love:   `Ты — гадалка любви Розовая Роза. Гадай на любовь и отношения. Будь чуткой, но честной. Говори о чувствах, совместимости, перспективах. Используй ❤️ 💕 💫. 300-350 слов.`,
  year:   `Ты — оракул Вечного Времени. Дай прогноз по 12 месяцам года. Каждый месяц — ключевое послание. Структурируй по месяцам. Используй 🌟 и эмодзи сезонов. 400-450 слов.`,
  free:   `Ты — добрый дух-предсказатель. Вытяни одну карту дня и дай краткое, но вдохновляющее послание на сегодня. Будь позитивным. Используй ✨ 🌙 ⭐. 150-200 слов.`,
};

const LOADING_TEXTS = [
  'Вглядываюсь в туман времени...',
  'Звёзды складываются в узоры...',
  'Духи открывают мне тайны...',
  'Карты шепчут своё послание...',
  'Руны вибрируют в темноте...',
  'Хрустальный шар проясняется...',
];

// ─── STATE ────────────────────────────────────────────────────
let state = { selectedSvc: null, question: '', history: [] };
try { state.history = JSON.parse(localStorage.getItem('fortune_history') || '[]'); } catch(e){}

// ─── STARS ───────────────────────────────────────────────────
function createStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%; left:${Math.random()*100}%;
      --d:${2+Math.random()*4}s; --min:${0.1+Math.random()*0.4};
      animation-delay:${Math.random()*4}s;
    `;
    c.appendChild(s);
  }
}

// ─── RENDER SERVICES ─────────────────────────────────────────
function renderServices() {
  const grid = document.getElementById('services-grid');
  grid.innerHTML = SERVICES.map(s => `
    <div class="svc-card" onclick="selectService('${s.key}')">
      <div class="svc-emoji">${s.emoji}</div>
      <div class="svc-info">
        <div class="svc-name">${s.name}</div>
        <div class="svc-desc">${s.desc}</div>
      </div>
      <div class="svc-price ${s.price === 0 ? 'free' : ''}">${s.price === 0 ? 'Бесплатно' : s.price + ' ⭐'}</div>
    </div>
  `).join('');
}

// ─── NAVIGATION ──────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goBack(screen) { showScreen(screen); }

function navTo(screen, btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (screen === 'screen-history') renderHistory();
  showScreen(screen);
}

// ─── SELECT SERVICE ──────────────────────────────────────────
function selectService(key) {
  state.selectedSvc = SERVICES.find(s => s.key === key);

  if (key === 'free') {
    // Бесплатно — сразу к вопросу
    renderQuestionScreen();
    showScreen('screen-question');
  } else {
    renderQuestionScreen();
    showScreen('screen-question');
  }
}

function renderQuestionScreen() {
  const s = state.selectedSvc;
  document.getElementById('selected-banner').innerHTML = `
    <div class="selected-svc-banner">
      <div class="emoji">${s.emoji}</div>
      <div>
        <div class="name">${s.name}</div>
        <div class="price">${s.price === 0 ? 'Бесплатно' : s.price + ' ⭐ Stars'}</div>
      </div>
    </div>
  `;
  document.getElementById('question-input').value = '';
}

function proceedToPayment() {
  state.question = document.getElementById('question-input').value.trim();
  const s = state.selectedSvc;

  if (s.price === 0) {
    startFortune(); // Бесплатно — сразу гадаем
  } else {
    // Показываем экран оплаты
    document.getElementById('payment-summary').innerHTML = `
      <div class="selected-svc-banner">
        <div class="emoji">${s.emoji}</div>
        <div>
          <div class="name">${s.name}</div>
          <div class="price" style="color:var(--muted)">Вопрос: ${state.question || '(общее)'}</div>
        </div>
      </div>
    `;
    document.getElementById('stars-amount').textContent = s.price + ' ⭐';
    document.getElementById('rub-amount').textContent = s.price + ' ₽';
    showScreen('screen-payment');
  }
}

function simulatePayment(method) {
  // Заглушка оплаты
  if (tg) tg.HapticFeedback.notificationOccurred('success');
  startFortune();
}

// ─── FORTUNE GENERATION ──────────────────────────────────────
async function startFortune() {
  showScreen('screen-loading');
  animateLoadingText();

  const svc = state.selectedSvc;
  const q = state.question;
  const system = PROMPTS[svc.key];
  const user = q && q.toLowerCase() !== 'общее'
    ? `Вопрос пользователя: "${q}"`
    : 'Пользователь не задал конкретного вопроса — дай общее послание.';

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${GROQ_KEY}`,
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [
          { role: 'system', content: system },
          { role: 'user', content: user },
        ],
        max_tokens: 700,
        temperature: 0.9,
      }),
    });

    const data = await res.json();
    const text = data.choices?.[0]?.message?.content || 'Звёзды временно молчат... Попробуй позже.';
    showResult(text);
  } catch(e) {
    showResult('🌙 Связь с мирами нарушена. Проверь API ключ и попробуй ещё раз.\n\nОшибка: ' + e.message);
  }
}

let loadingInterval;
function animateLoadingText() {
  let i = 0;
  const el = document.getElementById('loading-text');
  el.textContent = LOADING_TEXTS[0];
  clearInterval(loadingInterval);
  loadingInterval = setInterval(() => {
    i = (i + 1) % LOADING_TEXTS.length;
    el.style.opacity = '0';
    setTimeout(() => { el.textContent = LOADING_TEXTS[i]; el.style.opacity = '1'; }, 300);
  }, 2000);
}

function showResult(text) {
  clearInterval(loadingInterval);
  const svc = state.selectedSvc;

  document.getElementById('result-emoji').textContent = svc.emoji;
  document.getElementById('result-title').textContent = svc.name;
  document.getElementById('result-body').textContent = text;

  // Сохраняем в историю
  const entry = {
    id: Date.now(),
    key: svc.key,
    emoji: svc.emoji,
    name: svc.name,
    question: state.question,
    result: text,
    date: new Date().toLocaleDateString('ru-RU', { day:'numeric', month:'long' }),
  };
  state.history.unshift(entry);
  if (state.history.length > 20) state.history.pop();
  try { localStorage.setItem('fortune_history', JSON.stringify(state.history)); } catch(e){}

  showScreen('screen-result');
  if (tg) tg.HapticFeedback.notificationOccurred('success');
}

// ─── HISTORY ─────────────────────────────────────────────────
function renderHistory() {
  const el = document.getElementById('history-list');
  if (!state.history.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🌙</div><p>История пуста.<br>Сделай первое гадание!</p></div>`;
    return;
  }
  el.innerHTML = state.history.map(h => `
    <div class="history-item" onclick="viewHistoryItem(${h.id})">
      <div class="history-top">
        <span class="history-emoji">${h.emoji}</span>
        <span class="history-name">${h.name}</span>
        <span class="history-date">${h.date}</span>
      </div>
      <div class="history-preview">${h.result}</div>
    </div>
  `).join('');
}

function viewHistoryItem(id) {
  const h = state.history.find(x => x.id === id);
  if (!h) return;
  state.selectedSvc = SERVICES.find(s => s.key === h.key) || SERVICES[0];
  document.getElementById('result-emoji').textContent = h.emoji;
  document.getElementById('result-title').textContent = h.name;
  document.getElementById('result-body').textContent = h.result;
  showScreen('screen-result');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
}

// ─── SHARE ────────────────────────────────────────────────────
function shareResult() {
  const text = document.getElementById('result-body').textContent;
  const preview = text.substring(0, 200) + '...';
  if (tg) {
    tg.switchInlineQuery(preview, ['users']);
  } else if (navigator.share) {
    navigator.share({ title: 'Гадание от Мистресс Луны', text: preview });
  } else {
    navigator.clipboard?.writeText(preview);
    alert('Скопировано в буфер обмена!');
  }
}

// ─── INIT ─────────────────────────────────────────────────────
createStars();
renderServices();
</script>
</body>
</html>
